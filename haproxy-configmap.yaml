apiVersion: v1
kind: ConfigMap
metadata:
  name: haproxy-config
data:
  haproxy.cfg: |
    global
      log stdout format raw local0
      maxconn 256

    defaults
      log global
      mode http
      option httplog
      option dontlognull
      timeout connect 5000
      timeout client 50000
      timeout server 50000

    frontend http_front
      bind *:80
      default_backend http_back

    backend http_back
      balance roundrobin
      server tomcat tomcat-service:80 check